<!DOCTYPE html>
<html>
<head>
<style>
html, body {
	margin: 0;
	width: 100%;
	height: 100%;
	overflow: hidden;
	background: white;
}

.stripe {
	position: absolute;

	top: 50%;

	width: 120%;
	height: 25%;

	transform: translateY(-50%);

	background: linear-gradient(to left, #0042b3, #222);
}

.stripe.animate {
    animation: moveUp 0.8s ease-out forwards;
}

</style>
</head>

<body>
	<div class="stripe"></div>
	<script>
	window.addEventListener('revealready', () => {
		document.querySelector('.stripe').classList.add('animate');
	});
	</script>
</body>
</html>
